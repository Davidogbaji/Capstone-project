<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Feature-rich to-do app with due dates, edit, dark mode, and localStorage.">
  <title>📅 APP To-Do</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>📅 Smart To-Do</h1>
      <div class="header-right">
        <span id="taskCount" class="task-count">0 tasks left</span>
        <button id="themeToggle" class="theme-toggle" aria-label="Dark mode toggle">🌙</button>
      </div>
    </header>

    <form id="taskForm" class="add-form">
      <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" required>
      <input type="datetime-local" id="dueDateTime" class="due-input">
      <button type="submit">Add</button>
    </form>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
    </div>

    <ul id="taskList"></ul>

    <p id="emptyMsg" class="empty-msg">
      ✨ No tasks yet. Add one above!
    </p>
  </div>
  <script src="script.js"></script>
</body>
</html>
